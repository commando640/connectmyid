<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mr. Fahim — Digital Card</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --gold: #c9a84c;
    --gold2: #f0d080;
    --gold-dim: rgba(201,168,76,0.12);
    --bg: #080808;
    --bg2: #0f0f0f;
    --card-bg: #0c0c0c;
    --border: rgba(201,168,76,0.18);
    --border2: rgba(255,255,255,0.06);
    --text: #f0ece4;
    --text2: #7a7060;
    --text3: #4a4540;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

html, body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    overflow-x: hidden;
}

/* ── BG ATMOSPHERE ── */
body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
        radial-gradient(ellipse 60% 50% at 50% -10%, rgba(201,168,76,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 90%, rgba(201,168,76,0.04) 0%, transparent 60%);
}

/* ── CARD ── */
.card {
    position: relative;
    width: 100%;
    max-width: 390px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 28px;
    overflow: hidden;
    z-index: 1;
    box-shadow:
        0 0 0 1px rgba(201,168,76,0.08),
        0 40px 80px rgba(0,0,0,0.7),
        0 0 120px rgba(201,168,76,0.04);
    animation: cardReveal 1s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes cardReveal {
    from { opacity:0; transform:translateY(30px) scale(0.97); }
    to   { opacity:1; transform:translateY(0) scale(1); }
}

/* ── GOLD LINE TOP ── */
.card::before {
    content: '';
    position: absolute; top:0; left: 15%; right: 15%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    z-index: 2;
}

/* ── HEADER SECTION ── */
.header {
    padding: 40px 32px 28px;
    text-align: center;
    position: relative;
    border-bottom: 1px solid var(--border2);
}

/* Corner marks */
.corner { position: absolute; width: 18px; height: 18px; }
.corner.tl { top: 20px; left: 20px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); opacity: 0.5; }
.corner.tr { top: 20px; right: 20px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); opacity: 0.5; }

.avatar-wrap {
    position: relative;
    width: 96px; height: 96px;
    margin: 0 auto 20px;
    animation: avatarIn 1s 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes avatarIn {
    from { opacity:0; transform: scale(0.6); }
    to   { opacity:1; transform: scale(1); }
}

.avatar-ring {
    position: absolute; inset: -4px;
    border-radius: 50%;
    border: 1px solid var(--gold);
    opacity: 0.5;
}
.avatar-ring-2 {
    position: absolute; inset: -10px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.15);
}

.avatar-img {
    width: 96px; height: 96px;
    border-radius: 50%;
    object-fit: cover;
    background: linear-gradient(135deg, #1a1a1a, #2a2520);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    /* Placeholder if image fails */
    position: relative; z-index: 1;
}

.avatar-placeholder {
    width: 96px; height: 96px; border-radius: 50%;
    background: linear-gradient(135deg, #1c1a14, #2a2418);
    display: flex; align-items: center; justify-content: center;
    font-size: 38px; position: relative; z-index: 1;
    border: 2px solid rgba(201,168,76,0.15);
}

.name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px; font-weight: 300;
    color: var(--text);
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 6px;
    animation: fadeUp 0.8s 0.4s both;
}
.name span { font-style: italic; color: var(--gold); }

.title-line {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 14px;
    animation: fadeUp 0.8s 0.5s both;
}
.title-dash { width: 28px; height: 1px; background: var(--gold); opacity: 0.4; }
.title-text {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 3px; color: var(--text2);
    text-transform: uppercase;
}

.status-dot-row {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    animation: fadeUp 0.8s 0.6s both;
}
.status-dot {
    width: 6px; height: 6px; background: #3ddc84; border-radius: 50%;
    box-shadow: 0 0 8px #3ddc84;
    animation: statusPulse 2s ease-in-out infinite;
}
@keyframes statusPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.status-text { font-family:'DM Mono',monospace; font-size:9px; color:var(--text2); letter-spacing:2px; }

@keyframes fadeUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
}

/* ── LINKS SECTION ── */
.links-section {
    padding: 24px 24px 0;
}

.section-label {
    font-family: 'DM Mono', monospace; font-size: 8px;
    letter-spacing: 3px; color: var(--text3); text-transform: uppercase;
    margin-bottom: 14px; padding-left: 4px;
    animation: fadeUp 0.8s 0.7s both;
}

.links-grid {
    display: flex; flex-direction: column; gap: 8px;
    animation: fadeUp 0.8s 0.8s both;
}

.link-btn {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px; border-radius: 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border2);
    color: var(--text); text-decoration: none;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    position: relative; overflow: hidden;
    letter-spacing: 0.2px;
}
.link-btn::after {
    content: '';
    position: absolute; right: 0; top: 0; bottom: 0; width: 0;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.05));
    transition: width 0.3s;
}
.link-btn:hover::after { width: 100%; }
.link-btn:hover {
    border-color: rgba(201,168,76,0.25);
    background: rgba(201,168,76,0.04);
    transform: translateX(3px);
}
.link-btn:active { transform: scale(0.98); }

.link-icon-wrap {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
}

.link-label { flex: 1; }
.link-arrow { color: var(--text3); font-size: 10px; transition: 0.25s; }
.link-btn:hover .link-arrow { color: var(--gold); transform: translateX(2px); }

/* Icon colors */
.icon-cv     { background: rgba(201,168,76,0.1);  border: 1px solid rgba(201,168,76,0.2); }
.icon-fb     { background: rgba(24,119,242,0.1);  border: 1px solid rgba(24,119,242,0.2); }
.icon-ig     { background: rgba(228,64,95,0.1);   border: 1px solid rgba(228,64,95,0.2); }
.icon-yt     { background: rgba(255,0,0,0.1);     border: 1px solid rgba(255,0,0,0.2); }
.icon-wa     { background: rgba(37,211,102,0.1);  border: 1px solid rgba(37,211,102,0.2); }

.fa-file-pdf  { color: #c9a84c; }
.fa-facebook  { color: #1877F2; }
.fa-instagram { color: #E4405F; }
.fa-youtube   { color: #FF0000; }
.fa-whatsapp  { color: #25D366; }

/* ── DIVIDER ── */
.divider {
    margin: 24px 24px 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border2), transparent);
}

/* ── CONTACT FORM ── */
.contact-section {
    padding: 20px 24px 0;
    animation: fadeUp 0.8s 0.9s both;
}

.input-field {
    width: 100%; padding: 13px 16px; margin-bottom: 8px;
    border-radius: 12px;
    border: 1px solid var(--border2);
    background: rgba(255,255,255,0.03);
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 13px; outline: none;
    transition: 0.25s;
    resize: none;
}
.input-field::placeholder { color: var(--text3); }
.input-field:focus {
    border-color: rgba(201,168,76,0.3);
    background: rgba(201,168,76,0.03);
}

.send-btn {
    width: 100%; padding: 13px;
    border-radius: 12px; border: 1px solid rgba(201,168,76,0.4);
    background: linear-gradient(135deg, rgba(201,168,76,0.12), rgba(201,168,76,0.06));
    color: var(--gold2);
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 3px;
    font-weight: 500; cursor: pointer;
    transition: 0.25s;
    text-transform: uppercase;
}
.send-btn:hover {
    background: linear-gradient(135deg, rgba(201,168,76,0.22), rgba(201,168,76,0.12));
    border-color: rgba(201,168,76,0.6);
    box-shadow: 0 4px 20px rgba(201,168,76,0.1);
}
.send-btn:active { transform: scale(0.98); }

/* ── QUICK ACTIONS ── */
.actions-section {
    padding: 16px 24px 28px;
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
    animation: fadeUp 0.8s 1s both;
}

.action-btn {
    padding: 12px 6px; border-radius: 12px;
    border: 1px solid var(--border2);
    background: rgba(255,255,255,0.025);
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    font-size: 8px; letter-spacing: 1.5px;
    cursor: pointer; transition: 0.25s;
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
    text-transform: uppercase;
}
.action-btn i { font-size: 14px; color: var(--gold); }
.action-btn:hover {
    border-color: rgba(201,168,76,0.25);
    background: rgba(201,168,76,0.04);
    color: var(--text);
}
.action-btn:active { transform: scale(0.95); }

/* ── TOAST ── */
.toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1a1a14; border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold2); padding: 12px 24px; border-radius: 50px;
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px;
    opacity: 0; transition: 0.4s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none; z-index: 999; white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.toast.show {
    opacity: 1; transform: translateX(-50%) translateY(0);
}

/* ── FOOTER ── */
.card-footer {
    padding: 0 24px 20px;
    text-align: center;
}
.footer-text {
    font-family: 'DM Mono', monospace; font-size: 8px;
    color: var(--text3); letter-spacing: 2px;
}
.footer-gold { color: rgba(201,168,76,0.4); }

/* ── MUSIC WAVE ── */
.music-wave {
    display: none; align-items: center; gap: 2px;
    height: 14px; margin-left: 4px;
}
.music-wave.playing { display: flex; }
.wave-b {
    width: 2px; border-radius: 2px;
    background: var(--gold); opacity: 0.6;
    animation: waveAnim 0.8s ease-in-out infinite;
}
.wave-b:nth-child(1){height:6px;animation-delay:0s}
.wave-b:nth-child(2){height:12px;animation-delay:0.1s}
.wave-b:nth-child(3){height:8px;animation-delay:0.2s}
.wave-b:nth-child(4){height:10px;animation-delay:0.3s}
@keyframes waveAnim { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(0.3)} }
</style>
</head>
<body>

<audio id="bgm" loop preload="auto">
    <source src="bgm.mp3" type="audio/mpeg">
</audio>

<div class="toast" id="toast"></div>

<div class="card" onclick="playMusic()">

    <!-- Gold top accent handled by ::before -->

    <div class="header">
        <div class="corner tl"></div>
        <div class="corner tr"></div>

        <div class="avatar-wrap">
            <div class="avatar-ring-2"></div>
            <div class="avatar-ring"></div>
            <img src="profile.jpg" class="avatar-img"
                onerror="this.style.display='none'; document.getElementById('avatarFallback').style.display='flex';"
                alt="Fahim">
            <div class="avatar-placeholder" id="avatarFallback" style="display:none;">👤</div>
        </div>

        <div class="name">Mr. <span>Fahim</span></div>

        <div class="title-line">
            <div class="title-dash"></div>
            <div class="title-text">Digital Creator &nbsp;·&nbsp; Dream Builder</div>
            <div class="title-dash"></div>
        </div>

        <div class="status-dot-row">
            <div class="status-dot"></div>
            <div class="status-text">Available for work</div>
            <div class="music-wave" id="musicWave">
                <div class="wave-b"></div><div class="wave-b"></div>
                <div class="wave-b"></div><div class="wave-b"></div>
            </div>
        </div>
    </div>

    <!-- Social Links -->
    <div class="links-section">
        <div class="section-label">Connect with me</div>
        <div class="links-grid">

            <a href="cv.pdf" class="link-btn" target="_blank">
                <div class="link-icon-wrap icon-cv">
                    <i class="fas fa-file-pdf"></i>
                </div>
                <span class="link-label">Curriculum Vitae</span>
                <i class="fas fa-arrow-right link-arrow"></i>
            </a>

            <a href="https://www.facebook.com/share/1AYsgrjVQV/" class="link-btn" target="_blank">
                <div class="link-icon-wrap icon-fb">
                    <i class="fab fa-facebook"></i>
                </div>
                <span class="link-label">Facebook</span>
                <i class="fas fa-arrow-right link-arrow"></i>
            </a>

            <a href="https://www.instagram.com/fahim_way?igsh=MTl2bDRpMGU1NXA0aA==" class="link-btn" target="_blank">
                <div class="link-icon-wrap icon-ig">
                    <i class="fab fa-instagram"></i>
                </div>
                <span class="link-label">Instagram</span>
                <i class="fas fa-arrow-right link-arrow"></i>
            </a>

            <a href="https://youtube.com/@edupapaaa?si=PtIgVAQK6NYUad_h" class="link-btn" target="_blank">
                <div class="link-icon-wrap icon-yt">
                    <i class="fab fa-youtube"></i>
                </div>
                <span class="link-label">YouTube</span>
                <i class="fas fa-arrow-right link-arrow"></i>
            </a>

            <a href="https://wa.me/8801707549628" class="link-btn" target="_blank">
                <div class="link-icon-wrap icon-wa">
                    <i class="fab fa-whatsapp"></i>
                </div>
                <span class="link-label">WhatsApp</span>
                <i class="fas fa-arrow-right link-arrow"></i>
            </a>

        </div>
    </div>

    <div class="divider"></div>

    <!-- Contact Form -->
    <div class="contact-section">
        <div class="section-label" style="margin-bottom:12px;">Send a message</div>
        <form action="https://formspree.io/f/meelvnwr" method="POST" onsubmit="handleSubmit(event)">
            <input type="text" name="name" class="input-field" placeholder="Your name" required>
            <textarea name="message" class="input-field" placeholder="Your message..." rows="2" required></textarea>
            <button type="submit" class="send-btn">✦ &nbsp; Send Message &nbsp; ✦</button>
        </form>
    </div>

    <div class="divider"></div>

    <!-- Quick Actions -->
    <div class="actions-section">
        <button class="action-btn" onclick="copyNumber()">
            <i class="fas fa-copy"></i>
            Copy No.
        </button>
        <button class="action-btn" onclick="downloadVCard()">
            <i class="fas fa-address-card"></i>
            Save Card
        </button>
        <button class="action-btn" onclick="shareCard()">
            <i class="fas fa-share-alt"></i>
            Share
        </button>
    </div>

    <div class="card-footer">
        <div class="footer-text">
            <span class="footer-gold">✦</span>&nbsp; FAHIM &nbsp;<span class="footer-gold">·</span>&nbsp; DIGITAL CARD &nbsp;<span class="footer-gold">✦</span>
        </div>
    </div>

</div>

<script>
// ── AUDIO ──────────────────────────────────────────────
const audio = document.getElementById('bgm');
let musicPlaying = false;

function playMusic() {
    if (musicPlaying) return;
    audio.volume = 0;
    audio.play().then(() => {
        musicPlaying = true;
        document.getElementById('musicWave').classList.add('playing');
        let vol = 0;
        const fade = setInterval(() => {
            vol = Math.min(vol + 0.05, 0.5);
            audio.volume = vol;
            if (vol >= 0.5) clearInterval(fade);
        }, 150);
    }).catch(() => {});
}
document.addEventListener('touchstart', playMusic, { once: true });

// ── TOAST ──────────────────────────────────────────────
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

// ── COPY NUMBER ───────────────────────────────────────
function copyNumber() {
    navigator.clipboard.writeText("01707549628")
        .then(() => showToast('✦ Number Copied'))
        .catch(() => showToast('Press & hold to copy'));
}

// ── VCARD ─────────────────────────────────────────────
function downloadVCard() {
    const vcard = [
        'BEGIN:VCARD', 'VERSION:3.0',
        'FN:Mr. Fahim', 'N:Fahim;Mr.;;;',
        'TEL;TYPE=CELL:+8801707549628',
        'EMAIL:contact.fahim.edu@gmail.com',
        'URL:https://www.facebook.com/share/1AYsgrjVQV/',
        'ROLE:Digital Creator',
        'NOTE:Dream Builder',
        'END:VCARD'
    ].join('\n');
    const blob = new Blob([vcard], { type: 'text/vcard' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'Mr_Fahim.vcf';
    a.click();
    showToast('✦ Contact Saved');
}

// ── SHARE ─────────────────────────────────────────────
function shareCard() {
    if (navigator.share) {
        navigator.share({
            title: 'Mr. Fahim — Digital Card',
            text: 'Check out my digital card!',
            url: window.location.href
        }).catch(() => {});
    } else {
        navigator.clipboard.writeText(window.location.href)
            .then(() => showToast('✦ Link Copied'))
            .catch(() => showToast('Share not supported'));
    }
}

// ── FORM SUBMIT ───────────────────────────────────────
function handleSubmit(e) {
    const btn = e.target.querySelector('.send-btn');
    btn.textContent = '✦ Sending...';
    setTimeout(() => {
        btn.textContent = '✦  Sent Successfully  ✦';
        showToast('✦ Message Sent!');
        setTimeout(() => btn.textContent = '✦ \u00a0 Send Message \u00a0 ✦', 3000);
    }, 1000);
}
</script>
</body>
</html>
